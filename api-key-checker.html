<!DOCTYPE HTML>
<html>
<head>
    <title>API Key Type Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-4">API Key Service Checker</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">API Key</label>
            <input type="text" id="apiKey" value="AIzaSyBP_X2pw5Sz4zFiaIFVBD-00opo4wksGj8" 
                   class="w-full border rounded p-2" placeholder="Enter API key">
        </div>
        
        <button onclick="checkService()" class="bg-blue-600 text-white px-4 py-2 rounded">
            Check API Service
        </button>
        
        <div id="results" class="mt-4"></div>
    </div>
    
    <script>
        async function checkService() {
            const apiKey = document.getElementById('apiKey').value;
            const results = document.getElementById('results');
            
            results.innerHTML = '<div class="text-blue-600">Checking API service...</div>';
            
            // Test different Google services
            const tests = [
                {
                    name: 'Google Generative AI (Models List)',
                    url: `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`
                },
                {
                    name: 'Google Cloud AI Platform',
                    url: `https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`
                },
                {
                    name: 'Google Maps API',
                    url: `https://maps.googleapis.com/maps/api/geocode/json?address=New+York&key=${apiKey}`
                },
                {
                    name: 'Google Custom Search API',
                    url: `https://www.googleapis.com/customsearch/v1?q=test&cx=017576662512468239146:omuauf_lfve&key=${apiKey}`
                },
                {
                    name: 'Google YouTube API',
                    url: `https://www.googleapis.com/youtube/v3/search?q=test&part=snippet&key=${apiKey}`
                }
            ];
            
            let html = '<div class="space-y-3">';
            
            for (const test of tests) {
                try {
                    const response = await fetch(test.url);
                    const status = response.status;
                    
                    if (status === 200) {
                        const data = await response.json();
                        html += `<div class="p-3 bg-green-50 border border-green-200 rounded">
                            <h4 class="font-semibold text-green-800">✓ ${test.name}</h4>
                            <p class="text-sm text-green-600">Status: ${status} - API key works for this service</p>
                            <p class="text-xs text-gray-600 mt-1">Response: ${JSON.stringify(data).substring(0, 100)}...</p>
                        </div>`;
                    } else if (status === 403) {
                        html += `<div class="p-3 bg-yellow-50 border border-yellow-200 rounded">
                            <h4 class="font-semibold text-yellow-800">⚠ ${test.name}</h4>
                            <p class="text-sm text-yellow-600">Status: ${status} - API key is for this service but needs permissions</p>
                        </div>`;
                    } else {
                        const errorText = await response.text();
                        html += `<div class="p-3 bg-red-50 border border-red-200 rounded">
                            <h4 class="font-semibold text-red-800">✗ ${test.name}</h4>
                            <p class="text-sm text-red-600">Status: ${status} - Not this service</p>
                            <p class="text-xs text-gray-600 mt-1">Error: ${errorText.substring(0, 100)}...</p>
                        </div>`;
                    }
                } catch (error) {
                    html += `<div class="p-3 bg-gray-50 border border-gray-200 rounded">
                        <h4 class="font-semibold text-gray-800">⚠ ${test.name}</h4>
                        <p class="text-sm text-gray-600">Network error: ${error.message}</p>
                    </div>`;
                }
            }
            
            html += '</div>';
            results.innerHTML = html;
        }
    </script>
</body>
</html>
