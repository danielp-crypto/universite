<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-4xl mx-auto px-4">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Gemini API Test</h1>
            
            <!-- Test Configuration -->
            <div class="mb-6 p-4 bg-gray-50 rounded-lg">
                <h2 class="text-lg font-semibold mb-2">Configuration</h2>
                <div class="space-y-2 text-sm">
                    <div><strong>Model:</strong> <span id="model">gemini-1.5-flash</span></div>
                    <div><strong>API Key:</strong> <span id="apiKeyStatus">Checking...</span></div>
                </div>
            </div>

            <!-- Test Buttons -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <button id="testBasic" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                    Test Basic Connection
                </button>
                <button id="testChat" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition">
                    Test Chat Response
                </button>
                <button id="testTranscription" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 transition">
                    Test Transcription Support
                </button>
                <button id="testFlashcards" class="bg-orange-600 text-white px-4 py-2 rounded hover:bg-orange-700 transition">
                    Test Flashcard Generation
                </button>
            </div>

            <!-- Custom Test Input -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Custom Test Prompt</label>
                <div class="flex gap-2">
                    <input type="text" id="customPrompt" class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="Enter a test prompt..." value="What is artificial intelligence?">
                    <button id="testCustom" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition">
                        Test Custom
                    </button>
                </div>
            </div>

            <!-- Results -->
            <div class="space-y-4">
                <div id="results" class="hidden">
                    <h2 class="text-lg font-semibold mb-2">Test Results</h2>
                    <div id="resultContent" class="space-y-3"></div>
                </div>

                <div id="loading" class="hidden">
                    <div class="flex items-center justify-center py-8">
                        <div class="loading text-blue-600">Testing Gemini API...</div>
                    </div>
                </div>

                <div id="error" class="hidden">
                    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded">
                        <div id="errorContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Configuration -->
    <script src="js/config.js"></script>
    
    <script>
        // Test class for Gemini API
        class GeminiAPITester {
            constructor() {
                this.config = window.UniversiteConfig.getConfig();
                this.results = [];
            }

            showLoading() {
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('results').classList.add('hidden');
                document.getElementById('error').classList.add('hidden');
            }

            hideLoading() {
                document.getElementById('loading').classList.add('hidden');
            }

            showError(message) {
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('errorContent').textContent = message;
                this.hideLoading();
            }

            showResults() {
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('error').classList.add('hidden');
                this.hideLoading();
                
                const resultContent = document.getElementById('resultContent');
                resultContent.innerHTML = this.results.map(result => `
                    <div class="border rounded-lg p-4 ${result.success ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-semibold">${result.test}</h3>
                            <span class="text-sm ${result.success ? 'text-green-600' : 'text-red-600'}">
                                ${result.success ? '✓ Success' : '✗ Failed'}
                            </span>
                        </div>
                        <div class="text-sm text-gray-600">
                            <div class="mb-1"><strong>Duration:</strong> ${result.duration}ms</div>
                            ${result.response ? `<div class="mb-1"><strong>Response:</strong> ${result.response}</div>` : ''}
                            ${result.error ? `<div class="text-red-600"><strong>Error:</strong> ${result.error}</div>` : ''}
                        </div>
                    </div>
                `).join('');
            }

            async callGeminiAPI(prompt, testName = "Custom Test") {
                const startTime = Date.now();
                
                try {
                    const requestData = {
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            topK: 32,
                            topP: 0.95,
                            maxOutputTokens: 1024
                        }
                    };

                    const url = `${this.config.GEMINI.BASE_URL}/models/${this.config.GEMINI.MODEL}:generateContent?key=${this.config.GEMINI.API_KEY}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestData)
                    });

                    const duration = Date.now() - startTime;

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates.length > 0) {
                        const candidate = data.candidates[0];
                        if (candidate.content && candidate.content.parts && candidate.content.parts.length > 0) {
                            const responseText = candidate.content.parts[0].text;
                            
                            this.results.push({
                                test: testName,
                                success: true,
                                duration: duration,
                                response: responseText.substring(0, 200) + (responseText.length > 200 ? '...' : ''),
                                fullResponse: responseText
                            });
                            
                            this.showResults();
                            return { success: true, text: responseText };
                        }
                    }

                    throw new Error('No response generated');

                } catch (error) {
                    const duration = Date.now() - startTime;
                    
                    this.results.push({
                        test: testName,
                        success: false,
                        duration: duration,
                        error: error.message
                    });
                    
                    this.showResults();
                    return { success: false, error: error.message };
                }
            }

            async testBasicConnection() {
                this.showLoading();
                await this.callGeminiAPI("Hello! Can you respond with just 'API working'?", "Basic Connection Test");
            }

            async testChatResponse() {
                this.showLoading();
                await this.callGeminiAPI(
                    "Explain quantum computing in one sentence.",
                    "Chat Response Test"
                );
            }

            async testTranscriptionSupport() {
                this.showLoading();
                await this.callGeminiAPI(
                    "I'm testing transcription capabilities. Please respond with a short summary of what makes a good lecture transcript.",
                    "Transcription Support Test"
                );
            }

            async testFlashcardGeneration() {
                this.showLoading();
                await this.callGeminiAPI(
                    "Generate a simple flashcard about photosynthesis in JSON format: {\"front\": \"question\", \"back\": \"answer\"}",
                    "Flashcard Generation Test"
                );
            }

            async testCustomPrompt() {
                const prompt = document.getElementById('customPrompt').value;
                if (!prompt.trim()) {
                    this.showError('Please enter a custom prompt');
                    return;
                }
                
                this.showLoading();
                await this.callGeminiAPI(prompt, "Custom Prompt Test");
            }
        }

        // Initialize tester
        const tester = new GeminiAPITester();

        // Update configuration display
        document.addEventListener('DOMContentLoaded', () => {
            const config = window.UniversiteConfig.getConfig();
            
            document.getElementById('model').textContent = config.GEMINI.MODEL;
            
            // Check API key
            if (config.GEMINI.API_KEY && config.GEMINI.API_KEY !== 'YOUR_GEMINI_API_KEY') {
                document.getElementById('apiKeyStatus').innerHTML = '<span class="text-green-600">✓ Configured</span>';
            } else {
                document.getElementById('apiKeyStatus').innerHTML = '<span class="text-red-600">✗ Not configured</span>';
            }

            // Setup event listeners
            document.getElementById('testBasic').addEventListener('click', () => tester.testBasicConnection());
            document.getElementById('testChat').addEventListener('click', () => tester.testChatResponse());
            document.getElementById('testTranscription').addEventListener('click', () => tester.testTranscriptionSupport());
            document.getElementById('testFlashcards').addEventListener('click', () => tester.testFlashcardGeneration());
            document.getElementById('testCustom').addEventListener('click', () => tester.testCustomPrompt());

            // Allow Enter key in custom prompt
            document.getElementById('customPrompt').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    tester.testCustomPrompt();
                }
            });
        });
    </script>
</body>
</html>
