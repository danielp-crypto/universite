<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Gemini API Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-2xl mx-auto px-4">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Quick Gemini API Test</h1>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">API Key</label>
                <input type="text" id="apiKey" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" 
                       value="AIzaSyBP_X2pw5Sz4zFiaIFVBD-00opo4wksGj8" placeholder="Enter your Gemini API key">
            </div>

            <button id="testButton" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                Test All Variations
            </button>

            <div id="loading" class="hidden mt-4">
                <div class="text-blue-600">Testing all API variations...</div>
            </div>

            <div id="results" class="hidden mt-4">
                <h3 class="font-semibold mb-2">Results:</h3>
                <div id="resultContent" class="space-y-3"></div>
            </div>

            <div id="error" class="hidden mt-4">
                <h3 class="font-semibold mb-2 text-red-600">Error:</h3>
                <div id="errorContent" class="p-4 bg-red-50 rounded text-red-700"></div>
            </div>
        </div>
    </div>

    <script>
        const testConfigurations = [
            // Gemini API variations
            {
                name: 'Gemini Pro (v1beta)',
                url: (apiKey) => `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`,
                body: {
                    contents: [{
                        parts: [{
                            text: "Hello! Please respond with 'working' to confirm."
                        }]
                    }],
                    generationConfig: {
                        temperature: 0.7,
                        topK: 32,
                        topP: 0.95,
                        maxOutputTokens: 100
                    }
                }
            },
            {
                name: 'Gemini 1.5 Pro (v1beta)',
                url: (apiKey) => `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`,
                body: {
                    contents: [{
                        parts: [{
                            text: "Hello! Please respond with 'working' to confirm."
                        }]
                    }],
                    generationConfig: {
                        temperature: 0.7,
                        topK: 32,
                        topP: 0.95,
                        maxOutputTokens: 100
                    }
                }
            },
            {
                name: 'Gemini 1.5 Flash (v1beta)',
                url: (apiKey) => `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
                body: {
                    contents: [{
                        parts: [{
                            text: "Hello! Please respond with 'working' to confirm."
                        }]
                    }],
                    generationConfig: {
                        temperature: 0.7,
                        topK: 32,
                        topP: 0.95,
                        maxOutputTokens: 100
                    }
                }
            },
            // PaLM API variations
            {
                name: 'PaLM Text Bison (v1)',
                url: (apiKey) => `https://generativelanguage.googleapis.com/v1/models/text-bison-001:generateText?key=${apiKey}`,
                body: {
                    prompt: {
                        text: "Hello! Please respond with 'working' to confirm."
                    }
                }
            },
            {
                name: 'PaLM Chat Bison (v1)',
                url: (apiKey) => `https://generativelanguage.googleapis.com/v1/models/chat-bison-001:generateMessage?key=${apiKey}`,
                body: {
                    prompt: {
                        messages: [{
                            author: "user",
                            content: "Hello! Please respond with 'working' to confirm."
                        }]
                    }
                }
            },
            {
                name: 'PaLM Text Bison (v1beta)',
                url: (apiKey) => `https://generativelanguage.googleapis.com/v1beta/models/text-bison-001:generateText?key=${apiKey}`,
                body: {
                    prompt: {
                        text: "Hello! Please respond with 'working' to confirm."
                    }
                }
            }
        ];

        async function testAllVariations() {
            const apiKey = document.getElementById('apiKey').value.trim();
            
            if (!apiKey) {
                showError('Please enter an API key');
                return;
            }

            showLoading();
            const results = [];
            
            for (const config of testConfigurations) {
                try {
                    const url = config.url(apiKey);
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(config.body)
                    });
                    
                    const result = {
                        name: config.name,
                        status: response.ok ? 'SUCCESS' : 'ERROR',
                        statusCode: response.status,
                        response: null,
                        error: null
                    };
                    
                    if (response.ok) {
                        const data = await response.json();
                        
                        // Handle different response formats
                        if (data.candidates && data.candidates.length > 0) {
                            // Gemini format
                            result.response = data.candidates[0].content?.parts?.[0]?.text || 'No text content';
                        } else if (data.candidates && data.candidates.length > 0) {
                            // PaLM format
                            result.response = data.candidates[0].output || 'No text content';
                        } else {
                            result.response = JSON.stringify(data);
                        }
                    } else {
                        const errorText = await response.text();
                        result.error = `${response.status}: ${errorText.substring(0, 200)}`;
                    }
                    
                    results.push(result);
                    
                } catch (error) {
                    results.push({
                        name: config.name,
                        status: 'NETWORK_ERROR',
                        statusCode: 0,
                        response: null,
                        error: error.message
                    });
                }
                
                // Small delay between requests
                await new Promise(resolve => setTimeout(resolve, 200));
            }
            
            displayResults(results);
        }

        function displayResults(results) {
            const resultContent = document.getElementById('resultContent');
            let html = '';
            
            const successful = results.filter(r => r.status === 'SUCCESS');
            const failed = results.filter(r => r.status !== 'SUCCESS');
            
            if (successful.length > 0) {
                html += `<div class="border rounded-lg p-4 bg-green-50 border-green-200 mb-4">`;
                html += `<h4 class="font-semibold text-green-800">✓ Working APIs (${successful.length})</h4>`;
                html += `<div class="mt-2">`;
                successful.forEach(result => {
                    html += `<div class="text-sm text-green-600 mb-2">`;
                    html += `<strong>${result.name}</strong><br>`;
                    html += `Response: ${result.response}`;
                    html += `</div>`;
                });
                html += `</div></div>`;
            }
            
            if (failed.length > 0) {
                html += `<div class="border rounded-lg p-4 bg-red-50 border-red-200">`;
                html += `<h4 class="font-semibold text-red-800">✗ Failed APIs (${failed.length})</h4>`;
                html += `<div class="mt-2">`;
                failed.forEach(result => {
                    html += `<div class="text-sm text-red-600 mb-2">`;
                    html += `<strong>${result.name}</strong><br>`;
                    html += `Error: ${result.error}`;
                    html += `</div>`;
                });
                html += `</div></div>`;
            }
            
            resultContent.innerHTML = html;
            showResults();
        }

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
        }

        function showResults() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('error').classList.add('hidden');
        }

        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorContent').textContent = message;
        }

        // Setup event listener
        document.getElementById('testButton').addEventListener('click', testAllVariations);
    </script>
</body>
</html>
