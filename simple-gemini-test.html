<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Gemini API Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-2xl mx-auto px-4">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Simple Gemini API Test</h1>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">API Key</label>
                <input type="text" id="apiKey" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" 
                       value="AIzaSyAqpapZgs2z9oussNPp68ssXeVGIRf25qo" placeholder="Enter your Gemini API key">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Test Prompt</label>
                <textarea id="prompt" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" 
                          rows="3" placeholder="Enter a test prompt...">Hello! Please respond with 'API working' to confirm the connection.</textarea>
            </div>

            <button id="testButton" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                Test Gemini API
            </button>

            <div id="loading" class="hidden mt-4">
                <div class="text-blue-600">Testing...</div>
            </div>

            <div id="result" class="hidden mt-4">
                <h3 class="font-semibold mb-2">Result:</h3>
                <div id="resultContent" class="p-4 bg-gray-50 rounded"></div>
            </div>

            <div id="error" class="hidden mt-4">
                <h3 class="font-semibold mb-2 text-red-600">Error:</h3>
                <div id="errorContent" class="p-4 bg-red-50 rounded text-red-700"></div>
            </div>
        </div>
    </div>

    <script>
        async function testGeminiAPI() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const prompt = document.getElementById('prompt').value.trim();
            
            if (!apiKey) {
                showError('Please enter an API key');
                return;
            }
            
            if (!prompt) {
                showError('Please enter a test prompt');
                return;
            }

            showLoading();
            
            try {
                const requestData = {
                    contents: [{
                        parts: [{
                            text: prompt
                        }]
                    }],
                    generationConfig: {
                        temperature: 0.7,
                        topK: 32,
                        topP: 0.95,
                        maxOutputTokens: 1024
                    }
                };

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates.length > 0) {
                    const candidate = data.candidates[0];
                    if (candidate.content && candidate.content.parts && candidate.content.parts.length > 0) {
                        const responseText = candidate.content.parts[0].text;
                        showResult(responseText);
                        return;
                    }
                }

                throw new Error('No response generated');

            } catch (error) {
                showError(error.message);
            }
        }

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
        }

        function showResult(text) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('resultContent').textContent = text;
        }

        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorContent').textContent = message;
        }

        // Setup event listener
        document.getElementById('testButton').addEventListener('click', testGeminiAPI);
        
        // Allow Enter key in prompt textarea
        document.getElementById('prompt').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                testGeminiAPI();
            }
        });
    </script>
</body>
</html>
