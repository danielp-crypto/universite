<!DOCTYPE html>
<html>
<head>
    <title>Simple Permission Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-4">Permission Test</h1>
        
        <button onclick="testPermissions()" class="bg-blue-600 text-white px-4 py-2 rounded">
            Test API Permissions
        </button>
        
        <div id="results" class="mt-4"></div>
    </div>
    
    <script>
        async function testPermissions() {
            const apiKey = 'AIzaSyBP_X2pw5Sz4zFiaIFVBD-00opo4wksGj8';
            const results = document.getElementById('results');
            
            results.innerHTML = '<div class="text-blue-600">Testing...</div>';
            
            try {
                // Test 1: List models (should work if permissions are correct)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                
                if (response.ok) {
                    const data = await response.json();
                    const models = data.models || [];
                    
                    results.innerHTML = `
                        <div class="p-4 bg-green-50 border border-green-200 rounded">
                            <h3 class="font-semibold text-green-800">✅ API Permissions Working!</h3>
                            <p class="text-sm text-green-600 mt-2">Found ${models.length} available models:</p>
                            <ul class="text-xs text-gray-600 mt-2">
                                ${models.slice(0, 5).map(m => `<li>• ${m.name}</li>`).join('')}
                                ${models.length > 5 ? `<li>• ... and ${models.length - 5} more</li>` : ''}
                            </ul>
                        </div>
                    `;
                } else {
                    const error = await response.text();
                    results.innerHTML = `
                        <div class="p-4 bg-red-50 border border-red-200 rounded">
                            <h3 class="font-semibold text-red-800">❌ Still Permission Issues</h3>
                            <p class="text-sm text-red-600 mt-2">Status: ${response.status}</p>
                            <p class="text-xs text-gray-600 mt-2">${error}</p>
                            <div class="mt-3 p-3 bg-yellow-50 rounded">
                                <p class="text-sm font-medium text-yellow-800">🔧 To Fix:</p>
                                <ol class="text-xs text-yellow-700 mt-1 list-decimal list-inside">
                                    <li>Go to Google Cloud Console</li>
                                    <li>Enable "Generative Language API"</li>
                                    <li>Check API key restrictions</li>
                                    <li>Wait 5-10 minutes for changes</li>
                                </ol>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                results.innerHTML = `
                    <div class="p-4 bg-gray-50 border border-gray-200 rounded">
                        <h3 class="font-semibold text-gray-800">⚠ Network Error</h3>
                        <p class="text-sm text-gray-600">${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
